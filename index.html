<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StableHarvest · 수수료 시뮬</title>
<meta name="description" content="스테이블 송금 수수료 미리보기 시뮬. 가상 크레딧. 투자/실송금 아님."/>
<style>
:root{--bg:#0b0a10;--surf:#15131d;--gold:#67e8f9;--dim:#8a8398;--txt:#ece8f1;--line:#2a2438}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;max-width:440px;margin:0 auto;padding:18px 14px 48px;line-height:1.45}
h1{color:var(--gold);font-size:1.4rem}
.sub{color:var(--dim);font-size:12px;margin:6px 0 12px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0}
input,select{width:100%;background:#0e0c14;border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:10px;margin:6px 0}
button{width:100%;padding:12px;border:0;border-radius:10px;background:var(--gold);color:#0b0a10;font-weight:800;cursor:pointer;margin-top:8px}
button.sec{background:#1c1826;color:var(--txt);border:1px solid var(--line)}
.fee{font-size:15px;margin-top:10px}
.chip{display:inline-block;padding:4px 8px;border-radius:999px;background:#1c1826;font-size:11px;color:var(--dim);margin:2px}
a{color:var(--gold)}
footer{text-align:center;color:var(--dim);font-size:11px;margin-top:20px}
</style>
</head>
<body>
<p class="sub">p10 · fictional credits · 실송금 아님</p>
<h1>StableHarvest</h1>
<p class="sub">수수료 미리보기 · 가상 잔고 시뮬</p>
<div class="card">
  <span class="chip">잔고 <b id="bal" style="color:var(--gold)">1234.56</b> USDT</span>
  <span class="chip">가상</span>
</div>
<div class="card">
  <label class="sub">받는 곳</label>
  <input id="to" placeholder="0x… / @user / phone"/>
  <label class="sub">금액</label>
  <input id="amt" type="number" value="100"/>
  <label class="sub">자산</label>
  <select id="asset"><option>USDT</option><option>USDC</option><option>USD</option></select>
  <label class="sub">경로</label>
  <select id="route"><option value="fast">Fast (수수료↑)</option><option value="eco" selected>Eco (수수료↓)</option><option value="night">Night batch</option></select>
  <div class="fee" id="fee">—</div>
  <button id="preview">미리보기</button>
  <button class="sec" id="send">가상 송금 실행</button>
</div>
<div class="card" id="log"></div>
<p style="text-align:center"><a href="https://hosuman08-netizen.github.io/legion-hub/">← Arcade</a></p>
<footer>FICTIONAL · NO REAL TRANSFER · Not financial advice · 18+</footer>
<script>window.LEGION_APP='stable-harvest';window.LEGION_ANALYTICS_URL='https://legion-analytics.hoyashi95.workers.dev';</script>
<script src="legion-beacon.js"></script>
<script src="app.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}</script>
</body>
</html>
